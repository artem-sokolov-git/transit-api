name: stm-service

services:
  api:
    build: .
    container_name: stm-api
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/ping || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

networks:
  default:
    name: stm-net
